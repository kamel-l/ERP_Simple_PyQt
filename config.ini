[database]
# Chemin vers le fichier SQLite principal
path = erp_database.db

# Dossier où les sauvegardes automatiques sont stockées
backup_dir = backups

# Nombre maximum de sauvegardes à conserver
backup_max_count = 10

[app]
# Langue de l'interface (fr = Français)
language = fr

# Thème visuel : dark / light
theme = dark

# Nombre de lignes chargées par page (pagination)
page_size = 50

[logs]
# Activer les logs dans un fichier (true / false)
enabled = true

# Chemin du fichier de log
path = erp.log

# Niveau de log : DEBUG / INFO / WARNING / ERROR
level = INFO

[api]
# Token API utilisé pour l'authentification statique (laisser vide pour token temporaire)
ERP_API_TOKEN = 4BZQbFqqiWf_kSDRxLCIrCyfK9dLiR4Ncrd3xsJVzV0
# Exposer l'API sur le réseau local (true / false)
ERP_API_EXPOSE_NETWORK = true